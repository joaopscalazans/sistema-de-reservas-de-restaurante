<table>
    <thead>
        <th>Data</th>
        <th>Mesa</th>
    </thead>
    <tbody>
        @for(reserve of lista(); track reserve.id){
            <tr (click)="openModal(reserve)">
                <td>{{reserve.date | date:'dd/MM/yyyy HH:mm'}}</td>
                <td>{{reserve.table.name}}</td>
                <td>{{ reserve.status }}</td>
            </tr>
        }
    </tbody>
</table>

@if(showModal()){<app-reserve-details 
    [reserve]="selectReserve()!"
    (close)="closeModal()"
    (cancel)="cancel($event)"
></app-reserve-details>}
