
<h2>Reserve</h2>
<button (click)="close.emit()">Fechar</button>
@if(reserve().status != "CANCELLED"){<button (click)="alertCancel()">Cancelar</button>}
<div>
    <p>{{ reserve().id }}</p>
    <p>{{ reserve().date | date:'dd/MM/yyyy HH:mm'}}</p>
    <p>{{ reserve().user.name  }}</p>
    <p>{{ reserve().user.email }}</p>
    <p>{{ reserve().user.role  }}</p>
    <p>{{ reserve().table.name }}</p>
    <p>{{ reserve().table.capacity }}</p>
    <p>{{ reserve().status }}</p>
</div>
